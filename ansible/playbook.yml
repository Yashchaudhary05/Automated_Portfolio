---
# ── Ansible Playbook: Deploy DevOps Pipeline App ─────────
# Pulls the latest Docker image and deploys the container
# Usage: ansible-playbook playbook.yml -i inventory/hosts.yml

- name: Deploy DevOps Pipeline Application
  hosts: app_servers
  become: true
  vars_files:
    - vars/main.yml

  tasks:
    # ── Pre-deployment checks ────────────────────────────
    - name: Ensure Docker is installed
      ansible.builtin.package:
        name: docker.io
        state: present
      when: ansible_os_family == "Debian"

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    # ── Pull latest image ────────────────────────────────
    - name: Pull latest Docker image
      community.docker.docker_image:
        name: "{{ docker_image }}"
        tag: "{{ docker_tag }}"
        source: pull
        force_source: true
      register: image_pull

    - name: Display pull result
      ansible.builtin.debug:
        msg: "Image pulled: {{ docker_image }}:{{ docker_tag }}"

    # ── Stop old container ───────────────────────────────
    - name: Stop existing container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: true

    # ── Start new container ──────────────────────────────
    - name: Start new container
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}:{{ docker_tag }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ host_port }}:{{ container_port }}"
        env:
          NODE_ENV: "{{ node_env }}"
          APP_VERSION: "{{ app_version }}"
        healthcheck:
          test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:{{ container_port }}/health"]
          interval: 30s
          timeout: 5s
          retries: 3
          start_period: 10s

    # ── Post-deployment verification ─────────────────────
    - name: Wait for application to be healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ host_port }}/health"
        method: GET
        return_content: true
      register: health_check
      until: health_check.status == 200
      retries: 10
      delay: 5

    - name: Display deployment status
      ansible.builtin.debug:
        msg: |
          ✅ Deployment Successful!
          Container: {{ container_name }}
          Image: {{ docker_image }}:{{ docker_tag }}
          Port: {{ host_port }}
          Health: {{ health_check.json.status }}
