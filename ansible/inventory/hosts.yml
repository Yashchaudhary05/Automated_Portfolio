---
# ── Ansible Inventory ────────────────────────────────────
# Define target servers for deployment
# For local development, use localhost
# For VMs, replace with actual IP addresses

all:
  children:
    app_servers:
      hosts:
        local:
          ansible_host: localhost
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3

        # Uncomment and configure for remote VM deployment:
        # vm_server:
        #   ansible_host: 192.168.1.100
        #   ansible_user: deploy
        #   ansible_ssh_private_key_file: ~/.ssh/deploy_key
        #   ansible_python_interpreter: /usr/bin/python3
